<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 공부방</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const CATEGORIES = ['수학', '과학', '국어', '기타'];

        function App() {
            const [tasks, setTasks] = useState([]);
            const [taskInput, setTaskInput] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("수학");
            const [editingId, setEditingId] = useState(null);
            const [editText, setEditText] = useState("");
            const [showCelebration, setShowCelebration] = useState(false);
            const [showTimerEnd, setShowTimerEnd] = useState(false);
            const [timer, setTimer] = useState(1500);
            const [timerInput, setTimerInput] = useState(25);
            const [isActive, setIsActive] = useState(false);

            useEffect(() => {
                let interval = null;
                if (isActive && timer > 0) {
                    interval = setInterval(() => setTimer((t) => t - 1), 1000);
                } else if (timer === 0 && isActive) {
                    setIsActive(false);
                    setShowTimerEnd(true);
                    setTimeout(() => setShowTimerEnd(false), 2000);
                }
                return () => clearInterval(interval);
            }, [isActive, timer]);

            const toggleTimer = () => {
                if (!isActive) setTimer(timerInput * 60);
                setIsActive(!isActive);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const toggleTask = (id) => {
                const newTasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
                setTasks(newTasks);
                if (newTasks.length > 0 && newTasks.every(t => t.completed)) {
                    setShowCelebration(true);
                    setTimeout(() => setShowCelebration(false), 1000);
                }
            };

            const addTask = () => {
                if (!taskInput.trim()) return;
                setTasks([...tasks, { id: Date.now(), text: taskInput, completed: false, category: selectedCategory }]);
                setTaskInput("");
            };

            const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));
            const progress = tasks.length === 0 ? 0 : Math.round((tasks.filter(t => t.completed).length / tasks.length) * 100);

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans relative">
                    {showCelebration && (
                        <div className="absolute inset-0 bg-indigo-600/90 z-50 flex items-center justify-center text-white flex-col animate-pulse">
                            <h1 className="text-6xl font-black">축하합니다!</h1>
                        </div>
                    )}
                    {showTimerEnd && (
                        <div className="absolute inset-0 bg-blue-500/90 z-50 flex items-center justify-center text-white flex-col">
                            <h1 className="text-6xl font-black">타이머 끝!</h1>
                        </div>
                    )}

                    <header className="mb-8 text-center"><h1 className="text-3xl font-bold">나만의 디지털 공부방</h1></header>
                    <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="bg-white p-6 rounded-2xl shadow-lg border-2 flex flex-col items-center">
                            <h3 className="font-bold mb-2">집중 타이머</h3>
                            {!isActive ? (
                                <div className="mb-4"><input type="number" value={timerInput} onChange={(e) => setTimerInput(Math.max(1, parseInt(e.target.value)||0))} className="w-16 p-2 text-center border rounded"/> 분</div>
                            ) : (<div className="text-4xl font-bold mb-4">{formatTime(timer)}</div>)}
                            <button onClick={toggleTimer} className={`px-4 py-2 rounded ${isActive ? 'bg-amber-500' : 'bg-green-600'} text-white`}>{isActive ? '정지' : '시작'}</button>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-lg border-2">
                            <select value={selectedCategory} onChange={(e) => setSelectedCategory(e.target.value)} className="w-full p-2 mb-2 border rounded">
                                {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                            <div className="flex gap-2 mb-4">
                                <input value={taskInput} onChange={(e) => setTaskInput(e.target.value)} className="flex-1 p-2 border rounded" placeholder="할 일 입력"/>
                                <button onClick={addTask} className="bg-indigo-600 text-white px-4 py-2 rounded">추가</button>
                            </div>
                            {CATEGORIES.map(cat => (
                                <div key={cat} className="mb-4">
                                    <h3 className="font-bold border-b">{cat}</h3>
                                    {tasks.filter(t => t.category === cat).map(t => (
                                        <div key={t.id} className="flex items-center gap-2 p-2 border-b">
                                            <input type="checkbox" checked={t.completed} onChange={() => toggleTask(t.id)}/>
                                            <span className={t.completed ? 'line-through text-slate-400' : ''}>{t.text}</span>
                                            <button onClick={() => deleteTask(t.id)} className="text-red-500 ml-auto">삭제</button>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
